services:
  oauth2:
    build:
      context: .
      dockerfile: ./Dockerfile
      target: oauth2
    ports:
      - "8000:8000"
    environment:
      RUST_LOG: "info"
      ROCKET_ADDRESS: "0.0.0.0"

      OAUTH_ISSUER: "http://keycloak:9100/realms/dev"

      ROOT_CA_PATH: "/data/root-ca.pem"
      ROOT_CA_KEY_PATH: "/data/root-ca-key.pem"
      LEDGER_PATH: "/data/ledger.csv"

      CRL_PATH: "/data/issuing.crl"
      CRL_DIST_URL: "http://localhost:8000/crl/issuing.crl"
      WEBHOOK_BASE_URL: "http://webhook:8000"
      WEBHOOK_BEARER_TOKEN: ""
    user: "${UID:-}:${GID:-}"
    volumes:
      - oauth2:/data
      - ./root-ca.pem:/data/root-ca.pem:ro
      - ./root-ca-key.pem:/data/root-ca-key.pem:ro

    healthcheck:
      test: ["CMD", "/app/healthcheck"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3

  webhook:
    build:
      context: .
      dockerfile: ./Dockerfile
      target: webhook
    ports:
      - "8100:8000"
    environment:
      RUST_LOG: "info"
      ROCKET_ADDRESS: "0.0.0.0"

      OAUTH_ISSUER: "http://keycloak:9100/realms/dev"
      OAUTH_CLIENT_ID: "test-client-secret"
      OAUTH_CLIENT_SECRET: "some-secret"

      SERVER_BASE_URL: "http://oauth2:8000"
      SPOOL_DIR: "/data/spool"

      WEBHOOK_BASIC_USER: "user"
      WEBHOOK_BASIC_PASSWORD: "password"
      WEBHOOK_BEARER_TOKEN: ""
      # Comma-separated KEY=VALUE pairs of custom headers the webhook sender must include.
      # Example: "X-Hub-Signature=abc123,X-My-Header=val"
      WEBHOOK_CUSTOM_HEADERS: "X-Webhook-Source=ferriskey"

      GITHUB_TOKEN: ""
      GITHUB_REPO_OWNER: ""
      GITHUB_REPO_NAME: ""
      IDP_ADMIN_BASE_URL: "http://keycloak:9100/admin/realms/dev"
      IDP_TYPE: "keycloak"
      IDP_REVOKE_REASON: "Keycloak event"
      WAZUH_MANAGER_URL: ""
      WAZUH_API_USER: ""
      WAZUH_API_PASSWORD: ""
      WAZUH_API_TOKEN: ""
      WAZUH_AR_COMMAND_UNIX: "delete-cert.sh"
      WAZUH_AR_COMMAND_WINDOWS: "delete-cert.ps1"
      WAZUH_EVICTION_GRACE_SECONDS: 30
      WAZUH_AR_SPOOL_TTL_SECONDS: 86400
    user: "${UID:-}:${GID:-}"
    volumes:
      - webhook:/data/spool
    healthcheck:
      test: ["CMD", "/app/healthcheck"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3

  keycloak:
    image: quay.io/keycloak/keycloak:26.3.3
    ports:
      - "9100:9100"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: password
      KC_LOG_CONSOLE_COLOR: "true"
      KC_HTTP_PORT: 9100

      WEBHOOK_HTTP_BASE_PATH: "http://webhook:8000/api/webhook"
      WEBHOOK_HTTP_AUTH_USERNAME: "user"
      WEBHOOK_HTTP_AUTH_PASSWORD: "password"
    entrypoint: /bin/sh
    command:
      - -c
      - |
        set -ex

        cp /tmp/libs/*.jar /opt/keycloak/providers # Copy the provider jars to the providers directory
        /opt/keycloak/bin/kc.sh start-dev --import-realm # Start Keycloak in dev mode and import the realm
    volumes:
      - ./.docker/keycloak_config/:/opt/keycloak/data/import/:ro
      - ./root-ca.pem:/etc/ssl/root-ca.pem
      - spi:/tmp/libs:ro
    depends_on:
      download-theme:
        condition: service_completed_successfully

  keycloak-config:
    image: quay.io/keycloak/keycloak:26.3.3
    restart: on-failure
    entrypoint: /bin/sh
    command:
      - -c
      - |
        set -e

        /opt/keycloak/bin/kcadm.sh config credentials --server http://keycloak:9100 --realm master --user admin --password password
        /opt/keycloak/bin/kcadm.sh update realms/master -s sslRequired=NONE
        echo "Done"
    depends_on:
      keycloak:
        condition: service_started

  download-theme:
    image: busybox
    command:
      - /bin/sh
      - -c
      - |
        set -e;
        rm -rf /spi/*.jar
        wget -O /spi/keycloak-webhook-provider-core.jar "https://github.com/vymalo/keycloak-webhook/releases/download/v0.9.1/keycloak-webhook-provider-core-0.9.1-all.jar"
        wget -O /spi/keycloak-webhook-provider-http.jar "https://github.com/vymalo/keycloak-webhook/releases/download/v0.9.1/keycloak-webhook-provider-http-0.9.1-all.jar"
        echo "Downloaded theme";
    volumes:
      - spi:/spi

  ubuntu:
    image: bitnami/os-shell
    command:
      - /bin/sh
      - -c
      - |
        set -ex

        tail -f /dev/null
    volumes:
      - spi:/data/spi
      - webhook:/data/webhook
      - oauth2:/data/oauth2

  ferriskey-db:
    image: ${POSTGRES_IMAGE:-postgres:18.2}
    environment:
      PGUSER: ferriskey
      POSTGRES_DB: ferriskey
      POSTGRES_PASSWORD: ferriskey
      POSTGRES_USER: ferriskey
    ports:
      - 5432:5432
    volumes:
      - type: volume
        source: wazuh_ferriskey_pgdata
        target: /var/lib/postgresql
        volume: {}
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready
        - -d
        - ferriskey
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s

  ca:
    image: ghcr.io/ferriskey/ferriskey-standalone
    environment:
      DATABASE_HOST: ferriskey-db
      DATABASE_NAME: ferriskey
      DATABASE_PASSWORD: ferriskey
      DATABASE_USER: ferriskey
      SERVER_ROOT_PATH: /api
      ALLOWED_ORIGINS: http://localhost:8090
      WEBAPP_URL: http://localhost:8090
    ports:
      - 8090:80
    depends_on:
      ferriskey-db:
        condition: service_healthy

volumes:
  spi:
  webhook:
    driver: local
    driver_opts:
      type: "none"
      o: "bind"
      device: "./.docker/tmp"
  oauth2:
    driver: local
    driver_opts:
      type: "none"
      o: "bind"
      device: "./.docker/tmp"

  wazuh_ferriskey_pgdata:
    name: wazuh_ferriskey_pgdata
