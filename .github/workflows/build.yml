name: Build Docker image

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
    paths:
      - '.github/workflows/build.yml'
      - 'crates/wazuh-cert-oauth2-server/**'
      - 'crates/wazuh-cert-oauth2-metrics/**'
      - 'crates/wazuh-cert-oauth2-model/**'
      - 'crates/wazuh-cert-oauth2-webhook/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'Dockerfile'
      - '.dockerignore'

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  IMAGE_NAME: ADORSYS-GIS/wazuh-cert-oauth2

jobs:
  build:
    name: Docker build for ${{ matrix.flavour }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        flavour:
          - OAuth2
          - Webhook
        include:
          - flavour: OAuth2
            suffix: ""
            docker_target: "oauth2"
          - flavour: Webhook
            suffix: "-webhook"
            docker_target: "webhook"
    permissions:
      packages: write
      contents: read
      id-token: write # Required to sign SLSA provenance

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        name: Checkout repository
        with:
          fetch-depth: "0"
          persist-credentials: 'false'

      - name: Dockerfile scan (Trivy)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          scan-type: 'config'
          scan-ref: '.'
          trivy-config: 'trivy.yaml'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          hide-progress: true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c

      - name: Login to the Docker registry
        id: login
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: lowercase
        name: Lowercase image name
        uses: AsZc/change-string-case-action@ecd1412d078f2e06e9eedcbaa6fcd988151c3f82
        with:
          string: ${{ env.IMAGE_NAME }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302
        with:
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value={{branch}}
            type=match,pattern=v(.*),group=1
            type=schedule,pattern={{date 'YYYYMMDD-hhmmss' tz='Europe/Berlin'}}
            type=sha,format=long
            type=sha,format=long,prefix={{branch}}
          images: ${{ env.REGISTRY }}/${{ steps.lowercase.outputs.lowercase }}${{ matrix.suffix }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a
        if: github.event_name != 'pull_request'
        with:
          pull: true
          context: .
          file: "Dockerfile"
          push: "true"
          target: ${{ matrix.docker_target }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          platforms: linux/amd64
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache
          provenance: true
          sbom: true

      - name: Set canonical image ref
        id: img
        if: github.event_name != 'pull_request'
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ steps.lowercase.outputs.lowercase }}${{ matrix.suffix }}
          DIGEST: ${{ steps.build.outputs.digest }}
          REF: ${{ env.REGISTRY }}/${{ steps.lowercase.outputs.lowercase }}${{ matrix.suffix }}@${{ steps.build.outputs.digest }}
        run: |
          {
            printf 'image=%s\n' "$IMAGE"
            printf 'digest=%s\n' "$DIGEST"
            printf 'ref=%s\n' "$REF"
          } >> "$GITHUB_OUTPUT"

      - name: Vulnerability scan (Trivy)
        id: trivy
        if: github.event_name != 'pull_request'
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: ${{ steps.img.outputs.ref }}
          format: 'table'
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true

      - name: Install Cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6

      - name: Sign image (Cosign keyless)
        if: github.event_name != 'pull_request'
        run: cosign sign --yes --recursive ${{ steps.img.outputs.ref }}
