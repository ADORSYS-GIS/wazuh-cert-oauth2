name: Release Client

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
    paths:
      - '.github/workflows/release.yml'
      - 'crates/wazuh-cert-oauth2-client/**'
      - 'crates/wazuh-cert-oauth2-model/**'
      - 'crates/wazuh-cert-oauth2-model/**'
      - 'Cargo.toml'
      - 'Cargo.lock'

jobs:
  build-linux:
    name: Build CLI (Linux)
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: "0"
          persist-credentials: 'false'

      # Note: intentionally avoid caches in release build to prevent cache poisoning

      - name: Build with cross
        # The `openssl/vendored` feature flag instructs cargo to compile OpenSSL
        # from source and link it statically. This avoids the need to install
        # OpenSSL separately in the build environment, which is complex for
        # cross-compilation.
        uses: houseabsolute/actions-rust-cross@d5793ed10782223794bfb721b2a0810f88385f8e
        with:
          command: "build"
          target: ${{ matrix.target }}
          args: "-p wazuh-cert-oauth2-client --profile prod --features openssl/vendored"

      - name: Rename resource
        env:
          TARGET: ${{ matrix.target }}
        run: mv "target/$TARGET/prod/wazuh-cert-oauth2-client" "wazuh-cert-oauth2-client-$TARGET"

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: wazuh-cert-oauth2-client-${{ matrix.target }}
          path: wazuh-cert-oauth2-client-${{ matrix.target }}

  build-macos:
    name: Build CLI for macOS
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            runner: macos-15-intel
            brew_prefix: /usr/local/opt/openssl@3
          - target: aarch64-apple-darwin
            runner: macos-latest
            brew_prefix: /opt/homebrew/opt/openssl@3
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: "0"
          persist-credentials: 'false'

      # Note: intentionally avoid caches in release build to prevent cache poisoning

      - name: Install OpenSSL and pkg-config
        run: |
          brew update
          brew install pkg-config openssl@3

      - name: Build with cross
        uses: houseabsolute/actions-rust-cross@d5793ed10782223794bfb721b2a0810f88385f8e
        with:
          command: "build"
          target: ${{ matrix.target }}
          args: "-p wazuh-cert-oauth2-client --profile prod"
        env:
          PKG_CONFIG_PATH: ${{ matrix.brew_prefix }}/lib/pkgconfig
          OPENSSL_NO_VENDOR: "1"

      - name: Rename resource
        env:
          TARGET: ${{ matrix.target }}
        run: mv "target/$TARGET/prod/wazuh-cert-oauth2-client" "wazuh-cert-oauth2-client-$TARGET"

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: wazuh-cert-oauth2-client-${{ matrix.target }}
          path: wazuh-cert-oauth2-client-${{ matrix.target }}

  build-windows:
    name: Build CLI for Windows
    runs-on: windows-latest
    permissions:
      contents: read
    strategy:
      matrix:
        target:
          - x86_64-pc-windows-msvc
          - aarch64-pc-windows-msvc

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: "0"
          persist-credentials: 'false'

      # Note: intentionally avoid caches in release build to prevent cache poisoning

      - name: Build with cross
        uses: houseabsolute/actions-rust-cross@d5793ed10782223794bfb721b2a0810f88385f8e
        with:
          command: "build"
          target: ${{ matrix.target }}
          args: "-p wazuh-cert-oauth2-client --profile prod --features openssl/vendored"

      - name: Rename resource
        shell: pwsh
        env:
          TARGET: ${{ matrix.target }}
        run: Move-Item -Path "target/$env:TARGET/prod/wazuh-cert-oauth2-client.exe" -Destination "wazuh-cert-oauth2-client-$env:TARGET.exe"

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: wazuh-cert-oauth2-client-${{ matrix.target }}
          path: wazuh-cert-oauth2-client-${{ matrix.target }}.exe

  update-changelog-and-checksums:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    needs:
      - build-linux
      - build-macos
      - build-windows

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: "0"
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Download Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          path: ./target

      - name: Configure git user
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: Generate checksums
        run: |
          # Calculate binary checksums and strip directory prefix
          find target -type f -exec sha256sum {} + | sed 's|  target/[^/]*/|  |' > checksums.sha256
          # Calculate script checksums and keep paths
          find scripts -type f -exec sha256sum {} + >> checksums.sha256
          cat checksums.sha256

      - name: Generate full CHANGELOG.md
        uses: orhun/git-cliff-action@c93ef52f3d0ddcdcc9bd5447d98d458a11cd4f72
        with:
          config: cliff.toml
          args: --output CHANGELOG.md

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
          git_user_signingkey: true
          git_commit_gpgsign: true

      - name: Commit and push changes
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            git add CHANGELOG.md checksums.sha256
            git commit -m "docs: update CHANGELOG.md and checksums [skip ci]"
            git push origin ${{ github.head_ref || github.ref_name }}
          else
            echo "No changes to commit"
          fi
      
      - name: Upload Checksums
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          path: checksums.sha256

  release:
    name: Release
    permissions:
      contents: write
    needs:
      - update-changelog-and-checksums
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: "0"
          ref: main
          persist-credentials: 'false'

      - name: Get the version
        id: get_version
        shell: bash
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Download Artifacts
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3
        with:
          path: ./target

      - name: Generate release notes (latest only)
        id: git_cliff
        uses: orhun/git-cliff-action@c93ef52f3d0ddcdcc9bd5447d98d458a11cd4f72
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: /tmp/release-notes.md

      - name: Determine prerelease
        id: prerelease
        run: |
          if [[ "${GITHUB_REF#refs/tags/}" == *"rc"* ]]; then
            echo "PRERELEASE=true" >> $GITHUB_OUTPUT
          else
            echo "PRERELEASE=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b
        with:
          files: ./target/**/*
          body: ${{ steps.git_cliff.outputs.content }}
          prerelease: ${{ steps.prerelease.outputs.PRERELEASE }}
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          name: Release ${{ steps.get_version.outputs.VERSION }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}